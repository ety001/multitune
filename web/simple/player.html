<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>播放器 - 多音盒</title>
  <link rel="stylesheet" href="./css/simple.css">
</head>
<body class="simple-body">
  <div class="simple-header">
    <div class="simple-title">正在播放</div>
    <div class="simple-subtitle" id="playlistName">-</div>
  </div>

  <div class="simple-content">
    <div class="player-info">
      <div class="player-cover">♪</div>
      <div class="player-title" id="songTitle">请选择歌曲</div>
      <div class="player-artist" id="songArtist">-</div>
    </div>

    <div class="player-controls">
      <button class="player-control-btn" id="btnPrev" title="上一曲">⏮</button>
      <button class="player-control-btn large" id="btnPlay" title="播放/暂停">▶</button>
      <button class="player-control-btn" id="btnNext" title="下一曲">⏭</button>
    </div>

    <div style="text-align:center; padding: 10px; color: #94a3b8; font-size: 13px;">
      简化版播放器骨架，完整播放控制将在后续迭代实现
    </div>
  </div>

  <div class="simple-footer">
    <a href="./index.html" class="simple-btn simple-btn-secondary">切换身份</a>
    <a href="#" onclick="history.back(); return false;" class="simple-btn simple-btn-secondary" style="margin-left: 12px;">返回歌单</a>
  </div>

  <script src="./js/jquery-3.7.1.min.js"></script>
  <script src="./js/app.js"></script>
  <script>
    (function() {
      var identityId = MultiTune.getQuery('identity_id');
      var playlistId = MultiTune.getQuery('playlist_id');

      // 占位：加载歌单名称
      if (playlistId) {
        MultiTune.get('/playlists/' + encodeURIComponent(playlistId), function(err, data) {
          if (!err && data) {
            $('#playlistName').text(data.name || '未命名歌单');
          }
        });
      }

      // 占位按钮事件
      $('#btnPlay').on('click', function() {
        alert('播放控制即将上线');
      });
      $('#btnPrev').on('click', function() {
        alert('上一曲即将上线');
      });
      $('#btnNext').on('click', function() {
        alert('下一曲即将上线');
      });
    })();
  </script>
</body>
</html>
