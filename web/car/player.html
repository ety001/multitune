<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>播放器 - 多音盒</title>
  <link rel="stylesheet" href="./lib/bootstrap/css/bootstrap.min.css?v=3">
  <link rel="stylesheet" href="./lib/fontawesome/css/all.min.css?v=3">
  <link rel="stylesheet" href="./css/simple.css?v=3">
</head>
<body class="simple-body">
  <header class="player-header">
    <div class="container-fluid">
      <div class="row">
        <div class="col-xs-4 text-left header-side">
          <button class="btn btn-default btn-sm" id="btnSwitchIdentity">切换身份</button>
          <button class="btn btn-default btn-sm" id="btnSwitchPlaylist">切换歌单</button>
        </div>
        <div class="col-xs-4 text-center header-center">
          <div class="header-title">正在播放</div>
          <div class="header-subtitle" id="playlistName">-</div>
        </div>
        <div class="col-xs-4 text-right header-side">
          <button class="btn btn-default btn-sm" id="btnToggleList">播放列表</button>
        </div>
      </div>
    </div>
  </header>

  <div class="simple-content">
    <div id="playerArea">
      <div class="player-info">
        <div class="player-cover" id="playerCover"><i class="fas fa-music"></i></div>
        <div class="player-title" id="songTitle">加载中...</div>
        <div class="player-artist" id="songArtist">-</div>
      </div>

      <div class="player-progress-wrap">
        <input type="range" class="player-progress" id="progressBar" value="0" min="0" max="100" step="0.1">
        <div class="player-time">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <div class="player-controls">
        <button class="player-control-btn" id="btnPrev" title="上一曲"><i class="fas fa-backward-step"></i></button>
        <button class="player-control-btn large" id="btnPlay" title="播放/暂停"><i class="fas fa-play"></i></button>
        <button class="player-control-btn" id="btnNext" title="下一曲"><i class="fas fa-forward-step"></i></button>
      </div>

      <div class="player-extra">
        <button class="player-mode-btn" id="btnMode" title="切换播放模式"><i class="fas fa-arrow-right"></i> <span id="modeLabel">顺序播放</span></button>
        <div class="player-volume">
          <i class="fas fa-volume-high"></i>
          <input type="range" id="volumeBar" min="0" max="100" value="100">
        </div>
      </div>
    </div>
  </div>

  <!-- 播放列表弹层 -->
  <div class="modal fade" id="songListModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal" aria-label="关闭"><span aria-hidden="true">&times;</span></button>
          <h4 class="modal-title">播放列表</h4>
        </div>
        <div class="modal-body playlist-modal-body" id="songList">
          <div class="loading">加载歌曲列表...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 选择身份弹层 -->
  <div class="modal fade" id="identityModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal" aria-label="关闭"><span aria-hidden="true">&times;</span></button>
          <h4 class="modal-title">选择身份</h4>
        </div>
        <div class="modal-body" id="identityList">
          <div class="loading">正在加载身份...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 选择歌单弹层 -->
  <div class="modal fade" id="playlistModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal" aria-label="关闭"><span aria-hidden="true">&times;</span></button>
          <h4 class="modal-title">选择歌单</h4>
        </div>
        <div class="modal-body" id="playlistList">
          <div class="loading">正在加载歌单...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 音频元素 -->
  <audio id="audioPlayer" preload="metadata"></audio>

  <script src="./js/jquery-3.7.1.min.js?v=3"></script>
  <script src="./lib/bootstrap/js/bootstrap.min.js?v=3"></script>
  <script src="./js/app.js?v=3"></script>
  <script src="./js/player.js?v=3"></script>
  <script>
    (function() {
      window.MultiTunePlayer.init({
        identityId: MultiTune.getQuery('identity_id'),
        playlistId: MultiTune.getQuery('playlist_id'),
        playlistNameEl: '#playlistName',
        titleEl: '#songTitle',
        artistEl: '#songArtist',
        coverEl: '#playerCover',
        audioEl: '#audioPlayer',
        playBtn: '#btnPlay',
        prevBtn: '#btnPrev',
        nextBtn: '#btnNext',
        modeBtn: '#btnMode',
        progressBar: '#progressBar',
        currentTimeEl: '#currentTime',
        totalTimeEl: '#totalTime',
        volumeBar: '#volumeBar',
        songListEl: '#songList',
        songListModal: '#songListModal',
        toggleListBtn: '#btnToggleList',
        switchIdentityBtn: '#btnSwitchIdentity',
        switchPlaylistBtn: '#btnSwitchPlaylist',
        identityModal: '#identityModal',
        identityListEl: '#identityList',
        playlistModal: '#playlistModal',
        playlistListEl: '#playlistList'
      });
    })();
  </script>
</body>
</html>
