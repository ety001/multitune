<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>播放器 - 多音盒</title>
  <link rel="stylesheet" href="./css/simple.css">
</head>
<body class="simple-body">
  <div class="simple-header">
    <div class="simple-title">正在播放</div>
    <div class="simple-subtitle" id="playlistName">-</div>
  </div>

  <div class="simple-content">
    <div id="playerArea">
      <div class="player-info">
        <div class="player-cover" id="playerCover">♪</div>
        <div class="player-title" id="songTitle">加载中...</div>
        <div class="player-artist" id="songArtist">-</div>
      </div>

      <div class="player-progress-wrap">
        <input type="range" class="player-progress" id="progressBar" value="0" min="0" max="100" step="0.1">
        <div class="player-time">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <div class="player-controls">
        <button class="player-control-btn" id="btnPrev" title="上一曲">⏮</button>
        <button class="player-control-btn large" id="btnPlay" title="播放/暂停">▶</button>
        <button class="player-control-btn" id="btnNext" title="下一曲">⏭</button>
      </div>

      <div class="player-extra">
        <button class="player-mode-btn" id="btnMode" title="切换播放模式">顺序播放</button>
        <div class="player-volume">
          <span>音量</span>
          <input type="range" id="volumeBar" min="0" max="100" value="100">
        </div>
      </div>

      <div class="player-list-toggle">
        <button class="simple-btn simple-btn-secondary" id="btnToggleList">展开播放列表</button>
      </div>

      <div class="player-list" id="songList" style="display: none;">
        <div class="loading">加载歌曲列表...</div>
      </div>
    </div>
  </div>

  <div class="simple-footer">
    <a href="./index.html" class="simple-btn simple-btn-secondary">切换身份</a>
    <a href="./playlist.html?identity_id=&lt;!-- set by js -->" id="backToPlaylist" class="simple-btn simple-btn-secondary" style="margin-left: 12px;">返回歌单</a>
    <a href="./logs.html" class="simple-btn simple-btn-secondary" style="margin-left: 12px;">查看日志</a>
  </div>

  <!-- 音频元素 -->
  <audio id="audioPlayer" preload="metadata"></audio>

  <script src="./js/jquery-3.7.1.min.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/player.js"></script>
  <script>
    (function() {
      var identityId = MultiTune.getQuery('identity_id');
      var playlistId = MultiTune.getQuery('playlist_id');

      if (!identityId || !playlistId) {
        $('#playerArea').html('<div class="error">缺少身份或歌单参数</div>');
        return;
      }

      $('#backToPlaylist').attr('href', './playlist.html?identity_id=' + encodeURIComponent(identityId));

      window.MultiTunePlayer.init({
        identityId: identityId,
        playlistId: playlistId,
        playlistNameEl: '#playlistName',
        titleEl: '#songTitle',
        artistEl: '#songArtist',
        coverEl: '#playerCover',
        audioEl: '#audioPlayer',
        playBtn: '#btnPlay',
        prevBtn: '#btnPrev',
        nextBtn: '#btnNext',
        modeBtn: '#btnMode',
        progressBar: '#progressBar',
        currentTimeEl: '#currentTime',
        totalTimeEl: '#totalTime',
        volumeBar: '#volumeBar',
        songListEl: '#songList',
        toggleListBtn: '#btnToggleList'
      });
    })();
  </script>
</body>
</html>
