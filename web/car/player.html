<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>播放器 - 多音盒</title>
  <link rel="stylesheet" href="./css/simple.css">
  <link rel="stylesheet" href="./lib/fontawesome/css/all.min.css">
</head>
<body class="simple-body">
  <div class="simple-header player-header">
    <div class="header-left">
      <a href="./playlist.html?identity_id=<!-- set by js -->" id="backToPlaylist" class="header-link">返回歌单</a>
      <a href="./index.html" class="header-link">切换身份</a>
    </div>
    <div class="header-center">
      <div class="simple-title">正在播放</div>
      <div class="simple-subtitle" id="playlistName">-</div>
    </div>
    <div class="header-right">
      <button class="header-link" id="btnToggleList">播放列表</button>
    </div>
  </div>

  <div class="simple-content">
    <div id="playerArea">
      <div class="player-info">
        <div class="player-cover" id="playerCover"><i class="fas fa-music"></i></div>
        <div class="player-title" id="songTitle">加载中...</div>
        <div class="player-artist" id="songArtist">-</div>
      </div>

      <div class="player-progress-wrap">
        <input type="range" class="player-progress" id="progressBar" value="0" min="0" max="100" step="0.1">
        <div class="player-time">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <div class="player-controls">
        <button class="player-control-btn" id="btnPrev" title="上一曲"><i class="fas fa-backward-step"></i></button>
        <button class="player-control-btn large" id="btnPlay" title="播放/暂停"><i class="fas fa-play"></i></button>
        <button class="player-control-btn" id="btnNext" title="下一曲"><i class="fas fa-forward-step"></i></button>
      </div>

      <div class="player-extra">
        <button class="player-mode-btn" id="btnMode" title="切换播放模式"><i class="fas fa-arrow-right"></i> <span id="modeLabel">顺序播放</span></button>
        <div class="player-volume">
          <i class="fas fa-volume-high"></i>
          <input type="range" id="volumeBar" min="0" max="100" value="100">
        </div>
      </div>
    </div>
  </div>

  <div class="player-list-modal" id="songListModal" style="display: none;">
    <div class="player-list-mask" id="songListMask"></div>
    <div class="player-list-panel">
      <div class="player-list-header">
        <div class="player-list-title">播放列表</div>
        <button class="player-list-close" id="btnCloseList" title="关闭">&times;</button>
      </div>
      <div class="player-list" id="songList">
        <div class="loading">加载歌曲列表...</div>
      </div>
    </div>
  </div>

  <!-- 音频元素 -->
  <audio id="audioPlayer" preload="metadata"></audio>

  <script src="./js/jquery-3.7.1.min.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/player.js"></script>
  <script>
    (function() {
      var identityId = MultiTune.getQuery('identity_id');
      var playlistId = MultiTune.getQuery('playlist_id');

      if (!identityId || !playlistId) {
        $('#playerArea').html('<div class="error">缺少身份或歌单参数</div>');
        return;
      }

      $('#backToPlaylist').attr('href', './playlist.html?identity_id=' + encodeURIComponent(identityId));

      window.MultiTunePlayer.init({
        identityId: identityId,
        playlistId: playlistId,
        playlistNameEl: '#playlistName',
        titleEl: '#songTitle',
        artistEl: '#songArtist',
        coverEl: '#playerCover',
        audioEl: '#audioPlayer',
        playBtn: '#btnPlay',
        prevBtn: '#btnPrev',
        nextBtn: '#btnNext',
        modeBtn: '#btnMode',
        progressBar: '#progressBar',
        currentTimeEl: '#currentTime',
        totalTimeEl: '#totalTime',
        volumeBar: '#volumeBar',
        songListEl: '#songList',
        toggleListBtn: '#btnToggleList',
        closeListBtn: '#btnCloseList',
        songListMask: '#songListMask',
        songListModal: '#songListModal'
      });
    })();
  </script>
</body>
</html>
