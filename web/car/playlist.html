<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>选择歌单 - 多音盒</title>
  <script>
    (function() {
      var qs = window.location.search || '';
      var identityMatch = qs.match(/[?&]identity_id=([^&]+)/);
      var identityId = identityMatch ? decodeURIComponent(identityMatch[1]) : '';
      var url = './player.html' + (identityId ? '?identity_id=' + encodeURIComponent(identityId) : '');
      window.location.replace(url);
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=./player.html">
</head>
<body class="simple-body">
  <div class="simple-content">
    <div class="loading">正在跳转...</div>
  </div>
</body>
</html>
