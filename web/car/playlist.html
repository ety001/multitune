<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>选择歌单 - 多音盒</title>
  <link rel="stylesheet" href="./css/simple.css">
</head>
<body class="simple-body">
  <div class="simple-header">
    <div class="simple-title" id="pageTitle">歌单</div>
    <div class="simple-subtitle">选择一个歌单开始播放</div>
  </div>

  <div class="simple-content">
    <div class="list-container" id="playlistList">
      <div class="loading">正在加载歌单...</div>
    </div>
  </div>

  <div class="simple-footer">
    <a href="./index.html" class="simple-btn simple-btn-secondary">切换身份</a>
    <a href="./logs.html" class="simple-btn simple-btn-secondary" style="margin-left: 12px;">查看日志</a>
  </div>

  <script src="./js/jquery-3.7.1.min.js"></script>
  <script src="./js/app.js"></script>
  <script>
    (function() {
      var identityId = MultiTune.getQuery('identity_id');
      var $list = $('#playlistList');

      if (!identityId) {
        MultiTune.showError($list, '缺少身份参数');
        return;
      }

      function renderPlaylists(items) {
        if (!items || items.length === 0) {
          MultiTune.showEmpty($list, '该身份下暂无歌单');
          return;
        }

        var html = '';
        for (var i = 0; i < items.length; i++) {
          var pl = items[i];
          var countText = (pl.song_count || 0) + ' 首歌曲';
          html += '<a href="./player.html?identity_id=' + encodeURIComponent(identityId) + '&playlist_id=' + encodeURIComponent(pl.id) + '" class="list-item">';
          html += '<div class="list-item-title">' + escapeHtml(pl.name || '未命名歌单') + '</div>';
          html += '<div class="list-item-meta">' + countText + '</div>';
          html += '</a>';
        }
        $list.html(html);
      }

      function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
      }

      MultiTune.get('/identities/' + encodeURIComponent(identityId) + '/playlists?limit=100', function(err, data) {
        if (err) {
          MultiTune.showError($list, '加载歌单失败：' + err);
          return;
        }
        renderPlaylists(data && data.items ? data.items : []);
      });
    })();
  </script>
</body>
</html>
