version: "3.8"

services:
  multitune:
    build: .
    container_name: multitune
    ports:
      - "8080:8080"
    volumes:
      # 应用数据：SQLite 数据库、迁移记录等
      - ./data:/app/data
      # 音乐文件挂载点（只读）
      # 应用不再锁定 MEDIA_ROOT，可按需挂载任意目录，例如：
      # - /path/to/music:/music:ro
      # - /mnt/usb:/usb:ro
    environment:
      - LOG_LEVEL=info
      - PLAYBACK_SAVE_INTERVAL=5
    restart: unless-stopped
